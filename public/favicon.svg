<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Premium dark background matching 611 detailing -->
  <rect width="512" height="512" rx="128" fill="#070708"/>
  
  <!-- Subtle glowing brand border -->
  <rect x="12" y="12" width="488" height="488" rx="116" stroke="url(#border-grad)" stroke-width="16" stroke-opacity="0.35"/>
  
  <!-- Logo text centered -->
  <text x="50%" y="54%" 
        font-family="'Intro', 'Montblanc', 'Montserrat', 'Inter', 'Arial Black', sans-serif" 
        font-size="240" 
        font-weight="900" 
        fill="#2a86ff" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        letter-spacing="-6">611</text>
        
  <defs>
    <!-- Cyan to purple gradient for subtle glowing border -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a86ff"/>
      <stop offset="100%" stop-color="#a832ff"/>
    </linearGradient>
  </defs>
</svg>